{% extends "base.html" %}

{% block contenido %}
<section class="tarjeta formulario">
    <h2>Editar cliente</h2>

    <form method="POST" action="{{ url_for('editar_cliente', id_cliente=cliente.id_cliente) }}">
        <label for="cedula">Cédula</label>
        <input type="text" id="cedula" name="cedula" value="{{ cliente.cedula }}" required>

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" value="{{ cliente.nombre }}" required>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" value="{{ cliente.correo }}" required>

        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" value="{{ cliente.telefono }}" required>

        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" name="direccion" value="{{ cliente.direccion }}" required>

        <div class="grupo-botones">
            <button class="boton" type="submit">Actualizar</button>
            <a class="boton-secundario" href="{{ url_for('index') }}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
